name: ONNX Export & Validation Pipeline

on:
  push:
    branches: [main, claude/**]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  onnx-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "
          import torch, onnx, onnxruntime, numpy, yaml
          print(f'torch:       {torch.__version__}')
          print(f'onnx:        {onnx.__version__}')
          print(f'onnxruntime: {onnxruntime.__version__}')
          print(f'numpy:       {numpy.__version__}')
          print(f'CUDA:        {torch.cuda.is_available()}')
          "

      - name: Train model (synthetic data, 3 epochs)
        run: |
          python -c "
          import yaml, torch, torch.nn as nn, torch.optim as optim, sys, time
          from pathlib import Path
          from torch.utils.data import DataLoader, TensorDataset
          sys.path.insert(0, '.')
          from src.models.simple_bev import build_model

          with open('configs/config.yaml') as f:
              cfg = yaml.safe_load(f)

          cfg['training']['epochs'] = 3
          cfg['training']['device'] = 'cpu'

          H   = cfg['input']['height']    # 224
          W   = cfg['input']['width']     # 400
          S   = cfg['model']['ncams']     # 6
          N   = 8

          model     = build_model(cfg)
          optimizer = optim.AdamW(model.parameters(), lr=cfg['training']['learning_rate'])
          criterion = nn.CrossEntropyLoss()

          # Synthetic camera intrinsics: pinhole with fx=fy=W, cx=W/2, cy=H/2
          K = torch.zeros(4, 4)
          K[0,0]=float(W); K[1,1]=float(W); K[0,2]=W/2.0; K[1,2]=H/2.0
          K[2,2]=1.0; K[3,3]=1.0
          pix_T_cams   = K.unsqueeze(0).unsqueeze(0).expand(N, S, -1, -1).clone()
          cam0_T_camXs = torch.eye(4).unsqueeze(0).unsqueeze(0).expand(N, S, -1, -1).clone()

          imgs   = torch.randn(N, S, cfg['input']['channels'], H, W)
          labels = torch.randint(0, cfg['model']['num_classes'],
                                 (N, cfg['model']['bev_h'], cfg['model']['bev_w']))
          loader = DataLoader(TensorDataset(imgs, pix_T_cams, cam0_T_camXs, labels),
                              batch_size=2, shuffle=True)

          for epoch in range(1, cfg['training']['epochs'] + 1):
              model.train(); total_loss = 0.0
              for batch_imgs, batch_pix, batch_cam0, batch_labels in loader:
                  optimizer.zero_grad()
                  loss = criterion(model(batch_imgs, batch_pix, batch_cam0), batch_labels)
                  loss.backward(); optimizer.step()
                  total_loss += loss.item()
              print(f'Epoch [{epoch}/{cfg[\"training\"][\"epochs\"]}] Loss: {total_loss/len(loader):.4f}')

          Path('artifacts').mkdir(exist_ok=True)
          torch.save(model.state_dict(), 'artifacts/simple_bev.pt')
          print('Model saved to artifacts/simple_bev.pt')
          "

      - name: Export to ONNX (3 inputs)
        run: |
          python -c "
          import torch, onnx, sys
          sys.path.insert(0, '.')
          from src.models.simple_bev import SimpleBEVModel

          B, S, H, W = 1, 6, 224, 400

          model = SimpleBEVModel()
          state = torch.load('artifacts/simple_bev.pt', map_location='cpu', weights_only=True)
          model.load_state_dict(state)
          model.eval()

          # Three dummy inputs matching the reference Segnet interface
          dummy_imgs = torch.randn(B, S, 3, H, W)

          K = torch.zeros(4, 4)
          K[0,0]=float(W); K[1,1]=float(W); K[0,2]=W/2.0; K[1,2]=H/2.0
          K[2,2]=1.0; K[3,3]=1.0
          dummy_pix  = K.unsqueeze(0).unsqueeze(0).expand(B, S, -1, -1).contiguous()
          dummy_cam0 = torch.eye(4).unsqueeze(0).unsqueeze(0).expand(B, S, -1, -1).contiguous()

          with torch.no_grad():
              torch.onnx.export(
                  model,
                  (dummy_imgs, dummy_pix, dummy_cam0),
                  'artifacts/simple_bev.onnx',
                  opset_version=17,
                  input_names=['rgb_camXs', 'pix_T_cams', 'cam0_T_camXs'],
                  output_names=['bev_segmentation'],
                  dynamic_axes={
                      'rgb_camXs':        {0: 'batch'},
                      'pix_T_cams':       {0: 'batch'},
                      'cam0_T_camXs':     {0: 'batch'},
                      'bev_segmentation': {0: 'batch'},
                  },
              )
          print('ONNX exported: artifacts/simple_bev.onnx')

          onnx_model = onnx.load('artifacts/simple_bev.onnx')
          onnx.checker.check_model(onnx_model)
          n_inputs  = len(onnx_model.graph.input)
          in_names  = [i.name for i in onnx_model.graph.input]
          print(f'ONNX graph validation: PASSED')
          print(f'ONNX inputs ({n_inputs}): {in_names}')
          assert n_inputs == 3, f'Expected 3 ONNX inputs, got {n_inputs}'
          "

      - name: Simplify ONNX model
        run: |
          python -c "
          import onnx
          from onnxsim import simplify

          model = onnx.load('artifacts/simple_bev.onnx')
          simp, ok = simplify(model)
          if ok:
              onnx.save(simp, 'artifacts/simple_bev_optimized.onnx')
              print('Optimized ONNX saved: artifacts/simple_bev_optimized.onnx')
          else:
              import shutil
              shutil.copy('artifacts/simple_bev.onnx', 'artifacts/simple_bev_optimized.onnx')
              print('Simplification failed, using base export')
          "

      - name: Numerical validation (PyTorch vs ONNX Runtime)
        run: |
          python -c "
          import torch, onnxruntime as ort, numpy as np, sys
          sys.path.insert(0, '.')
          from src.models.simple_bev import SimpleBEVModel

          MSE_THRESHOLD = 1e-6
          B, S, H, W = 1, 6, 224, 400

          # ── PyTorch model ────────────────────────────────────────────
          model = SimpleBEVModel()
          state = torch.load('artifacts/simple_bev.pt', map_location='cpu', weights_only=True)
          model.load_state_dict(state)
          model.eval()

          # ── ONNX Runtime session ─────────────────────────────────────
          opts = ort.SessionOptions()
          opts.graph_optimization_level = ort.GraphOptimizationLevel.ORT_ENABLE_ALL
          sess = ort.InferenceSession('artifacts/simple_bev_optimized.onnx', opts,
                                     providers=['CPUExecutionProvider'])
          in_names = [i.name for i in sess.get_inputs()]
          oname    = sess.get_outputs()[0].name
          print(f'ONNX inputs ({len(in_names)}): {in_names}')
          for i in sess.get_inputs():
              print(f'  {i.name}: shape={i.shape}')
          print(f'Output: {oname} shape={sess.get_outputs()[0].shape}')

          # Shared dummy camera matrices (same for all test runs)
          K = torch.zeros(4, 4)
          K[0,0]=float(W); K[1,1]=float(W); K[0,2]=W/2.0; K[1,2]=H/2.0
          K[2,2]=1.0; K[3,3]=1.0
          dummy_pix  = K.unsqueeze(0).unsqueeze(0).expand(B, S, -1, -1).contiguous()
          dummy_cam0 = torch.eye(4).unsqueeze(0).unsqueeze(0).expand(B, S, -1, -1).contiguous()

          # ── Numerical tests ──────────────────────────────────────────
          worst_mse = 0.0
          for i in range(5):
              imgs_t = torch.randn(B, S, 3, H, W)
              with torch.no_grad():
                  pt_out = model(imgs_t, dummy_pix, dummy_cam0).numpy()
              feed = {
                  in_names[0]: imgs_t.numpy(),
                  in_names[1]: dummy_pix.numpy(),
                  in_names[2]: dummy_cam0.numpy(),
              }
              ort_out  = sess.run([oname], feed)[0]
              diff     = pt_out.astype(np.float64) - ort_out.astype(np.float64)
              mse      = float(np.mean(diff ** 2))
              max_diff = float(np.max(np.abs(diff)))
              worst_mse = max(worst_mse, mse)
              print(f'  Sample {i+1}/5: MSE={mse:.2e}  MaxDiff={max_diff:.2e}')

          pt_pred   = pt_out.argmax(axis=1)
          ox_pred   = ort_out.argmax(axis=1)
          agreement = float((pt_pred == ox_pred).sum()) / float(pt_pred.size) * 100.0
          print(f'')
          print(f'Worst MSE:            {worst_mse:.2e}')
          print(f'Prediction agreement: {agreement:.2f}%')
          print(f'MSE threshold:        {MSE_THRESHOLD:.0e}')

          if worst_mse < MSE_THRESHOLD:
              print(f'RESULT: PASSED')
          else:
              print(f'RESULT: FAILED')
              sys.exit(1)
          "

      - name: Benchmark (PyTorch vs ONNX Runtime)
        run: |
          python -c "
          import torch, onnxruntime as ort, numpy as np, time, sys
          sys.path.insert(0, '.')
          from src.models.simple_bev import SimpleBEVModel

          B, S, H, W = 1, 6, 224, 400

          model = SimpleBEVModel()
          state = torch.load('artifacts/simple_bev.pt', map_location='cpu', weights_only=True)
          model.load_state_dict(state)
          model.eval()

          # Three inputs for the benchmark
          bench_imgs = torch.randn(B, S, 3, H, W)
          K = torch.zeros(4, 4)
          K[0,0]=float(W); K[1,1]=float(W); K[0,2]=W/2.0; K[1,2]=H/2.0
          K[2,2]=1.0; K[3,3]=1.0
          bench_pix  = K.unsqueeze(0).unsqueeze(0).expand(B, S, -1, -1).contiguous()
          bench_cam0 = torch.eye(4).unsqueeze(0).unsqueeze(0).expand(B, S, -1, -1).contiguous()

          # PyTorch warmup + benchmark
          with torch.no_grad():
              for _ in range(3): model(bench_imgs, bench_pix, bench_cam0)
          pt_lats = []
          with torch.no_grad():
              for _ in range(10):
                  t0 = time.perf_counter()
                  model(bench_imgs, bench_pix, bench_cam0)
                  pt_lats.append((time.perf_counter() - t0) * 1000)

          # ONNX Runtime warmup + benchmark
          opts = ort.SessionOptions()
          opts.graph_optimization_level = ort.GraphOptimizationLevel.ORT_ENABLE_ALL
          sess = ort.InferenceSession('artifacts/simple_bev_optimized.onnx', opts,
                                     providers=['CPUExecutionProvider'])
          in_names  = [i.name for i in sess.get_inputs()]
          oname     = sess.get_outputs()[0].name
          bench_feed = {
              in_names[0]: bench_imgs.numpy(),
              in_names[1]: bench_pix.numpy(),
              in_names[2]: bench_cam0.numpy(),
          }
          for _ in range(3): sess.run([oname], bench_feed)
          ort_lats = []
          for _ in range(10):
              t0 = time.perf_counter()
              sess.run([oname], bench_feed)
              ort_lats.append((time.perf_counter() - t0) * 1000)

          pt_arr  = np.array(pt_lats)
          ort_arr = np.array(ort_lats)
          print(f'PyTorch CPU:  {pt_arr.mean():.1f} ms (p95: {np.percentile(pt_arr, 95):.1f} ms)')
          print(f'ONNX Runtime: {ort_arr.mean():.1f} ms (p95: {np.percentile(ort_arr, 95):.1f} ms)')
          print(f'Speedup:      {pt_arr.mean()/ort_arr.mean():.2f}x')
          "

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: onnx-pipeline-artifacts
          path: |
            artifacts/simple_bev.onnx
            artifacts/simple_bev_optimized.onnx
          retention-days: 7
